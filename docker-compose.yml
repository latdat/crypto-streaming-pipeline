services:

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  
  producer:
      build: ./producer
      container_name: producer
      restart: unless-stopped
      environment:
        KAFKA_BOOTSTRAP: kafka:29092
        KAFKA_TOPIC: crypto-prices
      depends_on:
        kafka:
          condition: service_healthy
      networks:
        - default
  consumer:
    build: ./consumer
    container_name: consumer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: crypto-prices
      KAFKA_GROUP_ID: crypto-consumer-group
      DB_HOST: timescaledb
      DB_PORT: 5432
      POSTGRES_DB: crypto_db
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: cryptopass235371
      BATCH_SIZE: "50"
      FLUSH_INTERVAL: "2.0"
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"  
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
  kafka-exporter:
      image: redpandadata/kminion:latest
      container_name: kafka-exporter
      environment:
        KAFKA_BROKERS: "kafka:29092"
      ports:
        - "9308:8080"
      depends_on:
        kafka:
          condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://crypto_user:cryptopass235371@timescaledb:5432/crypto_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      timescaledb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - kafka-exporter
      - postgres-exporter
  grafana:
      image: grafana/grafana:latest
      container_name: grafana
      ports:
        - "3000:3000"
      environment:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_SMTP_ENABLED: "true"
        GF_SMTP_HOST: "smtp.gmail.com:587"
        GF_SMTP_USER: "phucvinh235371@gmail.com"
        GF_SMTP_PASSWORD: "oaotkrclkwewsxpk"
        GF_SMTP_FROM_ADDRESS: "phucvinh235371@gmail.com"
        GF_SMTP_FROM_NAME: "Grafana Alert"
      volumes:
        - grafana_data:/var/lib/grafana
      depends_on:
        - prometheus
volumes:
  kafka_data:
  timescale_data:
  prometheus_data:
  grafana_data: